<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Debug Thumbnails</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .thumbnail { width: 60px; height: 60px; object-fit: cover; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Thumbnail Debug Test</h1>
    <div id="status">Loading...</div>
    <div id="results"></div>
    
    <script>
        async function debugThumbnails() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            try {
                statusDiv.textContent = 'Fetching index.html...';
                const response = await fetch('/index.html');
                const html = await response.text();
                
                statusDiv.textContent = 'Parsing HTML...';
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const articles = doc.querySelectorAll('.article-card');
                statusDiv.innerHTML = `<span class="success">Found ${articles.length} articles</span>`;
                
                let foundThumbnails = 0;
                articles.forEach((article, index) => {
                    const title = article.querySelector('h2')?.textContent || 'No title';
                    const link = article.getAttribute('href');
                    const thumbnailElement = article.querySelector('.article-thumbnail img');
                    const thumbnailSrc = thumbnailElement ? thumbnailElement.getAttribute('src') : null;
                    
                    if (thumbnailSrc) foundThumbnails++;
                    
                    const debugItem = document.createElement('div');
                    debugItem.className = 'debug-item';
                    debugItem.innerHTML = `
                        <h3>Article ${index + 1}</h3>
                        <p><strong>Title:</strong> ${title}</p>
                        <p><strong>Link:</strong> ${link}</p>
                        <p><strong>Thumbnail found:</strong> ${thumbnailSrc ? '<span class="success">YES</span>' : '<span class="error">NO</span>'}</p>
                        ${thumbnailSrc ? `
                            <p><strong>Thumbnail src:</strong> ${thumbnailSrc}</p>
                            <p><strong>Test image:</strong><br>
                                <img src="${thumbnailSrc}" class="thumbnail" 
                                     onerror="this.parentElement.innerHTML += '<br><span class=\\'error\\'>Failed to load image!</span>'"
                                     onload="this.parentElement.innerHTML += '<br><span class=\\'success\\'>Image loaded successfully!</span>'">
                            </p>
                        ` : ''}
                    `;
                    resultsDiv.appendChild(debugItem);
                });
                
                statusDiv.innerHTML += `<br>Total thumbnails found: ${foundThumbnails}/${articles.length}`;
                
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
                console.error('Debug error:', error);
            }
        }
        
        // Run when page loads
        debugThumbnails();
    </script>
</body>
</html>
