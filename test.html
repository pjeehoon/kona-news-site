<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간 테스트</title>
</head>
<body>
    <h1>시간 테스트 페이지</h1>
    <p>UTC 시간: <span id="utc"></span></p>
    <p>KST 시간: <span id="kst"></span></p>
    <p>브라우저 로컬 시간: <span id="local"></span></p>
    
    <script>
        // UTC 시간
        const utcTime = new Date().toUTCString();
        document.getElementById('utc').textContent = utcTime;
        
        // KST 시간 (UTC + 9시간)
        const kstTime = new Date().toLocaleString('ko-KR', { 
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
        document.getElementById('kst').textContent = kstTime;
        
        // 로컬 시간
        const localTime = new Date().toLocaleString();
        document.getElementById('local').textContent = localTime;
    </script>
</body>
</html>
